name: Lint, build, test and push devcontainer image to GHCR

on:
  push:
    branches: [main]
    paths:
      - .devcontainer/Dockerfile
      - .github/workflows/ci-build-push.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-build-test-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_SUMMARY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: .devcontainer/Dockerfile
          failure-threshold: error

      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          load: true # load image into local docker image store (to be available for the smoke test)
          provenance: false
          sbom: false
          tags: ghcr.io/${{ github.repository }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm ghcr.io/${{ github.repository }}:ci-test bash -c '
            set -eux
            nvim --version
            gh --version
            bun --version
            yq --version
            dive --version
            kubectl version --client
            helm version
          '

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
